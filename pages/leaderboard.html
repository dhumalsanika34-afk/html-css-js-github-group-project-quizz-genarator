<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="./../css/leaderboard.css">
    <link rel="stylesheet" href="./../css/navbar.css">
    <link rel="stylesheet" href="./../js/leaderboard.js">
    <link rel="stylesheet" href="./../css/footer.css">


</head>
<div class="container">
    <h1 class="heading">
        <img src="./../images/trophy.png" class="trophy">
         Quiz Generator Leaderboard</h1>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="leaderboardBody">

            </tbody>
        
        </table>
    </div>

    <div class="btn-box">
        <button onclick="clearLeaderboard()">Clear Leaderboard</button>
    </div>
</div>


<body>
    <h1>Leaderboard</h1>

    <script>

        let leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

leaderboard.sort((a, b) => b.score - a.score);

const tbody = document.getElementById("leaderboardBody");

leaderboard.forEach((player, index) => {

    let rank = index + 1;
    let rankDisplay = rank;

    if(rank === 1){
        rankDisplay.src = "./../images/gold-medal.png";
    }
    else if(rank === 2){
        rankDisplay.src = "./../images/silver-medal.png";
    }
    else if(rank === 3){
        rankDisplay.src = "./../images/bronze-medal.png";
    }

    tbody.innerHTML += `
    <tr>
        <td>${rankDisplay}</td>
        <td>${player.name}</td>
        <td>${player.score}/10</td>
    </tr>
    `;
});

function clearLeaderboard(){

    if(confirm("Clear Leaderboard ?")){

        localStorage.removeItem("leaderboard");
        location.reload();
    }
}
       
 

   </script>

</body>

</html>
